<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Controle de Faltas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #c8f23a;
      --accent2: #ff5e5b;
      --accent3: #5bc4f5;
      --text: #eeeef2;
      --muted: #7a7a90;
      --safe: #c8f23a;
      --warn: #f5a623;
      --danger: #ff5e5b;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* GRID BACKGROUND */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,242,58,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,242,58,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 48px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo-area h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .logo-area h1 span {
      color: var(--accent);
    }

    .logo-area p {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .semester-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 0.8rem;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* ADD FORM */
    .add-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 36px;
      position: relative;
      overflow: hidden;
    }

    .add-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .panel-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    @media(max-width: 680px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid .btn-add { grid-column: span 2; }
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,242,58,0.08);
    }

    .field input::placeholder { color: var(--muted); }

    .btn-add {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    .btn-add:hover { opacity: 0.88; }
    .btn-add:active { transform: scale(0.97); }

    /* SUMMARY STRIP */
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    @media(max-width: 480px) { .summary-strip { grid-template-columns: 1fr; } }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .summary-card .label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .summary-card .value {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
    }

    .summary-card.total .value { color: var(--accent3); }
    .summary-card.safe .value { color: var(--safe); }
    .summary-card.at-risk .value { color: var(--danger); }

    /* DISCIPLINE LIST */
    #discipline-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
      border: 1px dashed var(--border);
      border-radius: 16px;
    }

    .empty-state .emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    /* CARD */
    .disc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .disc-card.status-safe   { border-left: 3px solid var(--safe); }
    .disc-card.status-warn   { border-left: 3px solid var(--warn); }
    .disc-card.status-danger { border-left: 3px solid var(--danger); }

    .disc-info { display: flex; flex-direction: column; gap: 10px; }

    .disc-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .disc-name {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
    }

    .disc-semester {
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 999px;
      letter-spacing: 0.06em;
    }

    .disc-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .disc-stats span strong {
      color: var(--text);
      font-size: 0.88rem;
    }

    /* PROGRESS BAR */
    .progress-wrap { display: flex; flex-direction: column; gap: 5px; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .progress-label .pct { font-weight: 500; }
    .progress-label .pct.safe   { color: var(--safe); }
    .progress-label .pct.warn   { color: var(--warn); }
    .progress-label .pct.danger { color: var(--danger); }

    .progress-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s cubic-bezier(.22,.68,0,1.2);
    }

    .fill-safe   { background: var(--safe); }
    .fill-warn   { background: var(--warn); }
    .fill-danger { background: var(--danger); }

    /* CONTROLS RIGHT */
    .disc-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .btn-icon {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn-icon:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

    .absence-ctrl {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-abs {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
      transition: background 0.15s, border-color 0.15s;
      line-height: 1;
      font-family: 'Syne', sans-serif;
    }

    .btn-abs.plus:hover  { background: rgba(200,242,58,0.15); border-color: var(--accent); }
    .btn-abs.minus:hover { background: rgba(255,94,91,0.15);  border-color: var(--danger); }

    .abs-count {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      min-width: 28px;
      text-align: center;
    }

    /* STATUS BADGE */
    .status-tag {
      font-size: 0.68rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .tag-safe   { background: rgba(200,242,58,0.12); color: var(--safe); }
    .tag-warn   { background: rgba(245,166,35,0.15); color: var(--warn); }
    .tag-danger { background: rgba(255,94,91,0.15);  color: var(--danger); }

    /* FOOTER */
    footer {
      margin-top: 60px;
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.82rem;
      color: var(--text);
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo-area">
      <h1>FALTAS<span>.</span>EXE</h1>
      <p>Controle de frequência — limite 25%</p>
    </div>
    <div class="semester-badge" id="semester-label">— sem semestre —</div>
  </header>

  <!-- ADD PANEL -->
  <div class="add-panel">
    <div class="panel-title">// Adicionar disciplina</div>
    <div class="form-grid">
      <div class="field">
        <label>Disciplina</label>
        <input type="text" id="inp-name" placeholder="Ex: Cálculo II" />
      </div>
      <div class="field">
        <label>Semestre</label>
        <input type="text" id="inp-semester" placeholder="Ex: 2025.1" />
      </div>
      <div class="field">
        <label>Horas totais (h)</label>
        <input type="number" id="inp-hours" placeholder="Ex: 60" min="1" />
      </div>
      <button class="btn-add" onclick="addDiscipline()">+ Adicionar</button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="summary-strip">
    <div class="summary-card total">
      <span class="label">Disciplinas</span>
      <span class="value" id="sum-total">0</span>
    </div>
    <div class="summary-card safe">
      <span class="label">Sem risco</span>
      <span class="value" id="sum-safe">0</span>
    </div>
    <div class="summary-card at-risk">
      <span class="label">Em risco / Reprovado</span>
      <span class="value" id="sum-risk">0</span>
    </div>
  </div>

  <!-- LIST -->
  <div id="discipline-list">
    <div class="empty-state">
      <span class="emoji">📋</span>
      Nenhuma disciplina ainda.<br/>Adicione uma acima para começar.
    </div>
  </div>

  <footer>faltas.exe — dados salvos localmente no seu navegador</footer>
</div>

<div id="toast"></div>

<script>
  const LIMIT = 0.25; // 25%

  let disciplines = JSON.parse(localStorage.getItem('faltas_disciplines') || '[]');

  function save() {
    localStorage.setItem('faltas_disciplines', JSON.stringify(disciplines));
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  function addDiscipline() {
    const name     = document.getElementById('inp-name').value.trim();
    const semester = document.getElementById('inp-semester').value.trim();
    const hours    = parseInt(document.getElementById('inp-hours').value);

    if (!name)           { toast('⚠ Informe o nome da disciplina.'); return; }
    if (!semester)       { toast('⚠ Informe o semestre.'); return; }
    if (!hours || hours < 1) { toast('⚠ Informe as horas totais.'); return; }

    disciplines.push({ id: Date.now(), name, semester, hours, absences: 0 });
    save();
    render();

    document.getElementById('inp-name').value     = '';
    document.getElementById('inp-semester').value = '';
    document.getElementById('inp-hours').value    = '';
    document.getElementById('inp-name').focus();
    toast(`✓ ${name} adicionada!`);
  }

  function remove(id) {
    if (!confirm('Remover esta disciplina?')) return;
    disciplines = disciplines.filter(d => d.id !== id);
    save();
    render();
  }

  function changeAbs(id, delta) {
    const d = disciplines.find(x => x.id === id);
    if (!d) return;
    d.absences = Math.max(0, d.absences + delta);
    save();
    render();
  }

  function getStatus(d) {
    const pct = d.absences / d.hours;
    if (pct >= LIMIT)  return 'danger';
    if (pct >= 0.18)   return 'warn';
    return 'safe';
  }

  function getStatusLabel(status) {
    if (status === 'danger') return '<span class="status-tag tag-danger">⚠ Reprovado</span>';
    if (status === 'warn')   return '<span class="status-tag tag-warn">⚡ Atenção</span>';
    return '<span class="status-tag tag-safe">✓ Ok</span>';
  }

  function render() {
    const list = document.getElementById('discipline-list');

    // Summary
    const safe = disciplines.filter(d => getStatus(d) === 'safe').length;
    const risk = disciplines.filter(d => getStatus(d) !== 'safe').length;
    document.getElementById('sum-total').textContent = disciplines.length;
    document.getElementById('sum-safe').textContent  = safe;
    document.getElementById('sum-risk').textContent  = risk;

    // Semester badge
    const semesters = [...new Set(disciplines.map(d => d.semester))];
    document.getElementById('semester-label').textContent =
      semesters.length ? semesters.join(' · ') : '— sem semestre —';

    if (disciplines.length === 0) {
      list.innerHTML = `<div class="empty-state"><span class="emoji">📋</span>Nenhuma disciplina ainda.<br/>Adicione uma acima para começar.</div>`;
      return;
    }

    list.innerHTML = disciplines.map(d => {
      const pct        = d.absences / d.hours;
      const pctDisplay = (pct * 100).toFixed(1);
      const maxAbs     = Math.floor(d.hours * LIMIT);
      const remaining  = Math.max(0, maxAbs - d.absences);
      const status     = getStatus(d);
      const barWidth   = Math.min(pct / LIMIT * 100, 100).toFixed(1);
      const fillClass  = `fill-${status}`;
      const pctClass   = `pct ${status}`;

      return `
      <div class="disc-card status-${status}">
        <div class="disc-info">
          <div class="disc-header">
            <span class="disc-name">${escHtml(d.name)}</span>
            <span class="disc-semester">${escHtml(d.semester)}</span>
            ${getStatusLabel(status)}
          </div>
          <div class="disc-stats">
            <span>Total: <strong>${d.hours}h</strong></span>
            <span>Faltas: <strong>${d.absences}h</strong></span>
            <span>Limite: <strong>${maxAbs}h</strong></span>
            <span>Restam: <strong>${remaining}h</strong></span>
          </div>
          <div class="progress-wrap">
            <div class="progress-label">
              <span>0%</span>
              <span class="${pctClass}">${pctDisplay}% do limite de 25%</span>
              <span>25%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${fillClass}" style="width:${barWidth}%"></div>
            </div>
          </div>
        </div>
        <div class="disc-controls">
          <button class="btn-icon" onclick="remove(${d.id})" title="Remover">✕</button>
          <div class="absence-ctrl">
            <button class="btn-abs minus" onclick="changeAbs(${d.id}, -1)">−</button>
            <span class="abs-count">${d.absences}</span>
            <button class="btn-abs plus"  onclick="changeAbs(${d.id}, +1)">+</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key on inputs
  ['inp-name','inp-semester','inp-hours'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addDiscipline();
    });
  });

  render();
</script>
</body>
</html>
